<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Theremin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: block;
    }
    #hud {
      position: absolute;
      left: 1rem;
      top: 1rem;
      z-index: 2;
      pointer-events: none;
      text-shadow: 0 0 8px #000, 0 1px 2px #000;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    #controls {
      position: absolute;
      right: 1rem;
      bottom: 1rem;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      justify-content: flex-end;
      max-width: min(100% - 2rem, 28rem);
    }
    #controls button,
    #controls label {
      pointer-events: auto;
      cursor: pointer;
    }
    button {
      padding: 0.55rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      background: rgba(20, 20, 35, 0.85);
      color: #fff;
      font-size: 0.9rem;
    }
    button:hover {
      background: rgba(40, 40, 70, 0.9);
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    #controls select {
      padding: 0.45rem 0.6rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(20, 20, 35, 0.85);
      color: #fff;
      font-size: 0.85rem;
    }
    .toggle {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.65rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(20, 20, 35, 0.85);
      font-size: 0.85rem;
      user-select: none;
    }
    .toggle input { accent-color: #7cf; }
    #hint {
      position: absolute;
      left: 50%;
      bottom: 5rem;
      transform: translateX(-50%);
      z-index: 1;
      font-size: 0.85rem;
      opacity: 0.7;
      text-shadow: 0 0 6px #000;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <video id="video" playsinline></video>
    <canvas id="overlay"></canvas>
    <div id="hud">
      <div id="freqLine">Frequency: — Hz</div>
      <div id="volLine">Volume: —</div>
      <div id="handLine">Hand: —</div>
      <div id="openLine">Open: —</div>
    </div>
    <p id="hint">Two hands: right = pitch (green) · left = volume (blue) · one hand = pitch only</p>
    <div id="controls">
      <button type="button" id="btnStart">Start</button>
      <button type="button" id="btnStop" disabled>Stop</button>
      <label class="toggle">
        <input type="checkbox" id="scaleLock" />
        C major lock
      </label>
      <label for="waveType">Wave</label>
      <select id="waveType">
        <option value="sine" selected>sine</option>
        <option value="triangle">triangle</option>
        <option value="sawtooth">sawtooth</option>
      </select>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script>
(function () {
  'use strict';

  /*
   * Two-hand theremin (mirrored video): wrist x sorts hands — smaller raw x = further right on screen.
   * - Rightmost hand → pitch (landmark 8 y → 200–1200 Hz or C-major).
   * - Leftmost hand → volume (landmark 8 y, inverted: higher hand = louder).
   * - Pitch hand openness (palm→fingertip distances) → +Hz offset + vibrato depth.
   * - One hand only → pitch from that hand; volume target fixed at 0.5.
   * Smoothing: pitch, volume, openness each use smooth = prev*0.8 + current*0.2.
   * Audio: OscillatorNode + GainNode; start only after "Start".
   */

  // --- Pitch mapping: C major frequencies in ~200–1200 Hz (scale lock) ---
  const C_MAJOR_FREQS = [
    261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25,
    587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50
  ];

  const PITCH_MIN = 200;
  const PITCH_MAX = 1200;

  // Mapping: vertical y — top of frame (y→0) maps to high pitch; bottom (y→1) to low pitch.
  function yToRawPitchHz(yNorm, scaleLock) {
    const t = 1 - yNorm; // 0 at bottom, 1 at top
    if (scaleLock) {
      const n = C_MAJOR_FREQS.length;
      const idx = Math.min(n - 1, Math.max(0, Math.round(t * (n - 1))));
      return C_MAJOR_FREQS[idx];
    }
    return PITCH_MIN + t * (PITCH_MAX - PITCH_MIN);
  }

  // Volume hand: Y-axis inverted — top of frame (y→0) = louder, bottom (y→1) = quieter.
  function yToRawVolume(yNorm) {
    return Math.min(1, Math.max(0, 1 - yNorm));
  }

  const VOLUME_SINGLE_HAND = 0.5;

  // Sort hand indices by wrist (0) x ascending: first = rightmost on mirrored display = pitch.
  function sortHandsPitchThenVolume(landmarksList) {
    const idx = landmarksList.map(function (_, i) { return i; });
    idx.sort(function (a, b) {
      return landmarksList[a][0].x - landmarksList[b][0].x;
    });
    return idx;
  }

  // Hand openness: avg distance palm (0) → fingertips [4,8,12,16,20], normalized by calibration.
  const FINGERTIP_IDS = [4, 8, 12, 16, 20];
  const OPEN_DIST_MIN = 0.05;
  const OPEN_DIST_MAX = 0.25;

  function euclid2d(a, b) {
    const dx = a.x - b.x;
    const dy = a.y - b.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  /** @param {Array<{x:number,y:number,z?:number}>} landmarks */
  function handOpennessNormalized(landmarks) {
    const palm = landmarks[0];
    let sum = 0;
    for (let i = 0; i < FINGERTIP_IDS.length; i++) {
      sum += euclid2d(palm, landmarks[FINGERTIP_IDS[i]]);
    }
    const avg = sum / FINGERTIP_IDS.length;
    const t = (avg - OPEN_DIST_MIN) / (OPEN_DIST_MAX - OPEN_DIST_MIN);
    return Math.min(1, Math.max(0, t));
  }

  // Expression: base pitch + (smoothOpen * 100) Hz; vibrato = sin(t*10) * smoothOpen * 20.
  const OPEN_PITCH_HZ = 100;
  const VIBRATO_RATE = 10;
  const VIBRATO_DEPTH_MAX = 20;

  // Smoothing: smooth = prev * 0.8 + current * 0.2 (applied to frequency and volume targets).
  const SMOOTH_PREV = 0.8;
  const SMOOTH_CUR = 0.2;

  /** @type {AudioContext | null} */
  let audioCtx = null;
  /** @type {OscillatorNode | null} */
  let osc = null;
  /** @type {GainNode | null} */
  let gainNode = null;
  let audioRunning = false;

  let smoothFreq = PITCH_MIN;
  let smoothVol = 0;
  let smoothOpen = 0;

  const video = document.getElementById('video');
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');
  const btnStart = document.getElementById('btnStart');
  const btnStop = document.getElementById('btnStop');
  const scaleLockEl = document.getElementById('scaleLock');
  const waveTypeEl = document.getElementById('waveType');
  const freqLine = document.getElementById('freqLine');
  const volLine = document.getElementById('volLine');
  const handLine = document.getElementById('handLine');
  const openLine = document.getElementById('openLine');

  function resizeCanvas() {
    const w = video.videoWidth || window.innerWidth;
    const h = video.videoHeight || window.innerHeight;
    if (w && h) {
      canvas.width = w;
      canvas.height = h;
    } else {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
  }

  window.addEventListener('resize', resizeCanvas);

  // Audio setup: one oscillator into a gain node; no sound until Start (unlocks AudioContext).
  function startAudio() {
    if (audioRunning) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0;
    osc = audioCtx.createOscillator();
    osc.type = waveTypeEl.value;
    osc.frequency.value = smoothFreq;
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audioRunning = true;
    btnStart.disabled = true;
    btnStop.disabled = false;
  }

  function stopAudio() {
    if (!audioRunning || !osc || !audioCtx) return;
    try {
      osc.stop();
      osc.disconnect();
    } catch (_) {}
    if (gainNode) gainNode.disconnect();
    audioCtx.close().catch(function () {});
    audioCtx = null;
    osc = null;
    gainNode = null;
    audioRunning = false;
    btnStart.disabled = false;
    btnStop.disabled = true;
  }

  waveTypeEl.addEventListener('change', function () {
    if (osc) osc.type = waveTypeEl.value;
  });

  btnStart.addEventListener('click', startAudio);
  btnStop.addEventListener('click', stopAudio);

  function applyAudioFromHands(pitchLm8, volLm8, handCount, pitchHandLandmarks) {
    const scaleLock = scaleLockEl.checked;
    let targetFreq = smoothFreq;
    let targetVol = 0;
    let targetOpen = 0;

    if (handCount === 0) {
      targetFreq = smoothFreq;
      targetVol = 0;
    } else if (handCount === 1 && pitchLm8) {
      targetFreq = yToRawPitchHz(pitchLm8.y, scaleLock);
      targetVol = VOLUME_SINGLE_HAND;
    } else if (handCount >= 2 && pitchLm8 && volLm8) {
      targetFreq = yToRawPitchHz(pitchLm8.y, scaleLock);
      targetVol = yToRawVolume(volLm8.y);
    }

    if (pitchHandLandmarks) {
      targetOpen = handOpennessNormalized(pitchHandLandmarks);
    }

    smoothFreq = smoothFreq * SMOOTH_PREV + targetFreq * SMOOTH_CUR;
    smoothVol = smoothVol * SMOOTH_PREV + targetVol * SMOOTH_CUR;
    smoothOpen = smoothOpen * SMOOTH_PREV + targetOpen * SMOOTH_CUR;

    const centerHz = smoothFreq + smoothOpen * OPEN_PITCH_HZ;
    freqLine.textContent = 'Frequency: ' + centerHz.toFixed(1) + ' Hz';
    volLine.textContent = 'Volume: ' + smoothVol.toFixed(3);
    openLine.textContent = 'Open: ' + smoothOpen.toFixed(2);

    if (!audioRunning || !audioCtx || !osc || !gainNode) return;

    const t = audioCtx.currentTime;
    const vibrato = Math.sin(t * VIBRATO_RATE) * smoothOpen * VIBRATO_DEPTH_MAX;
    const finalHz = centerHz + vibrato;
    osc.frequency.setValueAtTime(finalHz, t);
    gainNode.gain.setValueAtTime(smoothVol, t);
  }

  function drawFingerDotAt(lm8, glowInner, glowMid, core) {
    const w = canvas.width;
    const h = canvas.height;
    const px = (1 - lm8.x) * w;
    const py = lm8.y * h;

    const glow = ctx.createRadialGradient(px, py, 0, px, py, 28);
    glow.addColorStop(0, glowInner);
    glow.addColorStop(0.35, glowMid);
    glow.addColorStop(1, 'rgba(0, 0, 0, 0)');

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(px, py, 28, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = core;
    ctx.beginPath();
    ctx.arc(px, py, 8, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawOpenTextOnCanvas() {
    const h = canvas.height;
    const label = 'Open: ' + smoothOpen.toFixed(2);
    ctx.save();
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textBaseline = 'bottom';
    ctx.strokeStyle = 'rgba(0,0,0,0.85)';
    ctx.lineWidth = 4;
    ctx.strokeText(label, 16, h - 16);
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fillText(label, 16, h - 16);
    ctx.restore();
  }

  // Hand mesh: thin lines + soft glow; pitch hand cyan, volume hand pink (matches sort order).
  const MESH_LINE_WIDTH = 0.9;
  const MESH_ALPHA_LINES = 0.52;
  const MESH_ALPHA_JOINTS = 0.48;
  const MESH_SHADOW_BLUR = 5;
  const MESH_PALETTE_PITCH = {
    line: 'rgb(105, 200, 210)',
    glow: 'rgba(110, 215, 225, 0.55)',
    joint: 'rgb(135, 225, 232)'
  };
  const MESH_PALETTE_VOL = {
    line: 'rgb(210, 140, 180)',
    glow: 'rgba(220, 150, 195, 0.5)',
    joint: 'rgb(228, 175, 210)'
  };

  function lmToScreen(lm, w, h) {
    return { x: (1 - lm.x) * w, y: lm.y * h };
  }

  /** Uses global HAND_CONNECTIONS from MediaPipe Hands. */
  function drawHandMesh(landmarks, palette) {
    const w = canvas.width;
    const h = canvas.height;
    const conn = typeof HAND_CONNECTIONS !== 'undefined' ? HAND_CONNECTIONS : [];
    ctx.save();
    ctx.globalAlpha = MESH_ALPHA_LINES;
    ctx.lineWidth = MESH_LINE_WIDTH;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = palette.line;
    ctx.shadowColor = palette.glow;
    ctx.shadowBlur = MESH_SHADOW_BLUR;
    ctx.beginPath();
    for (let i = 0; i < conn.length; i++) {
      const a = conn[i][0];
      const b = conn[i][1];
      const p0 = lmToScreen(landmarks[a], w, h);
      const p1 = lmToScreen(landmarks[b], w, h);
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = MESH_ALPHA_JOINTS;
    ctx.fillStyle = palette.joint;
    for (let j = 0; j < landmarks.length; j++) {
      const p = lmToScreen(landmarks[j], w, h);
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawFingerDots(pitchLm8, volLm8, handCount, list, order) {
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    if (audioRunning && list && handCount > 0 && order.length) {
      drawHandMesh(list[order[0]], MESH_PALETTE_PITCH);
      if (handCount >= 2) {
        drawHandMesh(list[order[1]], MESH_PALETTE_VOL);
      }
    }

    if (pitchLm8) {
      drawFingerDotAt(
        pitchLm8,
        'rgba(80, 255, 140, 0.95)',
        'rgba(40, 200, 100, 0.45)',
        'rgba(160, 255, 180, 0.95)'
      );
    }
    if (handCount >= 2 && volLm8) {
      drawFingerDotAt(
        volLm8,
        'rgba(100, 180, 255, 0.95)',
        'rgba(60, 120, 255, 0.45)',
        'rgba(180, 220, 255, 0.95)'
      );
    }
    drawOpenTextOnCanvas();
  }

  function onResults(results) {
    const list = results.multiHandLandmarks;
    const handCount = list ? list.length : 0;

    let pitchLm8 = null;
    let volLm8 = null;
    let pitchHandLandmarks = null;
    let order = [];

    if (handCount > 0) {
      order = sortHandsPitchThenVolume(list);
      pitchHandLandmarks = list[order[0]];
      pitchLm8 = pitchHandLandmarks[8];
      if (handCount >= 2) {
        const volHand = list[order[1]];
        volLm8 = volHand[8];
      }
    }

    if (handCount === 0) {
      handLine.textContent = 'Hands: none (muted)';
    } else if (handCount === 1) {
      handLine.textContent = 'Hands: 1 — pitch only, volume fixed at 0.5';
    } else {
      handLine.textContent = 'Hands: 2 — green pitch · blue volume';
    }

    applyAudioFromHands(pitchLm8, volLm8, handCount, pitchHandLandmarks);
    drawFingerDots(pitchLm8, volLm8, handCount, list, order);
  }

  const hands = new Hands({
    locateFile: function (file) {
      return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + file;
    }
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });
  hands.onResults(onResults);

  const camera = new Camera(video, {
    onFrame: async function () {
      await hands.send({ image: video });
    },
    width: 1280,
    height: 720
  });

  video.addEventListener('loadeddata', function () {
    resizeCanvas();
  });

  camera.start().catch(function (err) {
    handLine.textContent = 'Camera error: ' + (err && err.message ? err.message : String(err));
  });
})();
  </script>
</body>
</html>

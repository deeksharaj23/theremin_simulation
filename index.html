<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Theremin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: block;
    }
    #hud {
      position: absolute;
      left: 1rem;
      top: 1rem;
      z-index: 2;
      pointer-events: none;
      text-shadow: 0 0 8px #000, 0 1px 2px #000;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    #controls {
      position: absolute;
      right: 1rem;
      bottom: 1rem;
      top: auto;
      left: auto;
      z-index: 2;
      pointer-events: none;
      max-width: min(100% - 2rem, 36rem);
    }
    .controls-panel {
      pointer-events: auto;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 0.5rem;
      padding: 0.55rem 0.65rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(14, 14, 24, 0.72);
      backdrop-filter: blur(10px);
      box-shadow:
        6px 6px 18px rgba(0, 0, 0, 0.28),
        0 0 0 1px rgba(0, 0, 0, 0.2);
    }
    .controls-row {
      display: flex;
      gap: 0.45rem;
      align-items: center;
      flex-shrink: 0;
    }
    #controls button,
    #controls label {
      cursor: pointer;
    }
    .icon-btn {
      width: 2.5rem;
      height: 2.5rem;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      background: rgba(20, 20, 35, 0.85);
      color: #fff;
    }
    .icon-btn:hover:not(:disabled) {
      background: rgba(40, 40, 70, 0.9);
    }
    .icon-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .icon-btn svg {
      display: block;
      flex-shrink: 0;
    }
    .control-field {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.45rem 0.65rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(20, 20, 35, 0.85);
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    .control-field-label {
      flex-shrink: 0;
      color: rgba(232, 232, 240, 0.92);
    }
    .control-field select {
      min-width: 5.5rem;
      padding: 0.4rem 0.55rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(12, 12, 22, 0.9);
      color: #fff;
      font-size: 0.85rem;
    }
    .toggle {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 0.65rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(20, 20, 35, 0.85);
      font-size: 0.85rem;
      user-select: none;
      flex-shrink: 0;
    }
    .toggle .lock-icon {
      flex-shrink: 0;
      opacity: 0.9;
    }
    .toggle input { accent-color: #7cf; }
    #hint {
      position: absolute;
      left: 50%;
      bottom: 5rem;
      transform: translateX(-50%);
      z-index: 1;
      font-size: 0.85rem;
      opacity: 0.7;
      text-shadow: 0 0 6px #000;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <video id="video" playsinline></video>
    <canvas id="overlay"></canvas>
    <div id="hud">
      <div id="freqLine">Frequency: — Hz</div>
      <div id="volLine">Volume: —</div>
      <div id="handLine">Hand: —</div>
      <div id="openLine">Open: —</div>
    </div>
    <p id="hint">Two hands: right = pitch (green) · left = volume (blue) · one hand = pitch only</p>
    <div id="controls">
      <div class="controls-panel">
        <div class="controls-row">
          <button type="button" id="btnStart" class="icon-btn" aria-label="Start">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button type="button" id="btnStop" class="icon-btn" aria-label="Stop" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 6h12v12H6z"/></svg>
          </button>
        </div>
        <label class="toggle">
          <input type="checkbox" id="scaleLock" checked />
          <svg class="lock-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="5" y="11" width="14" height="10" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <span>C Major</span>
        </label>
        <div class="control-field">
          <span class="control-field-label">Wave</span>
          <select id="waveType" aria-label="Waveform">
            <option value="sine" selected>sine</option>
            <option value="triangle">triangle</option>
            <option value="sawtooth">sawtooth</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script>
(function () {
  'use strict';

  /*
   * Two-hand theremin: pitch uses avg Y of MCP joints (5,9,13); exponential pitch curve.
   * Velocity-based smoothing + dead zone on pitch / volume Y / openness; Web Audio ramps on freq & gain.
   */

  // C major (multiple octaves) — used when “C Major Lock” snaps continuous pitch to nearest note.
  const scale = [
    130.81, 146.83, 164.81, 174.61, 196.00, 220.00, 246.94,
    261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88
  ];

  const PITCH_MIN = 200;
  const PITCH_MAX = 1200;

  const STABLE_Y_IDS = [5, 9, 13];

  function avgStableY(landmarks) {
    return (
      landmarks[STABLE_Y_IDS[0]].y +
      landmarks[STABLE_Y_IDS[1]].y +
      landmarks[STABLE_Y_IDS[2]].y
    ) / 3;
  }

  // curve = (1-y)^2 → freq = 200 + curve * 1000 (always; snapping is optional)
  function continuousFreqFromY(yNorm) {
    const curve = Math.pow(1 - yNorm, 2);
    return PITCH_MIN + curve * (PITCH_MAX - PITCH_MIN);
  }

  function snapToScale(freq, scaleArr) {
    let closest = scaleArr[0];
    let minDiff = Math.abs(freq - closest);
    for (let note of scaleArr) {
      const diff = Math.abs(freq - note);
      if (diff < minDiff) {
        closest = note;
        minDiff = diff;
      }
    }
    return closest;
  }

  // Volume hand: Y-axis inverted — top of frame (y→0) = louder, bottom (y→1) = quieter.
  function yToRawVolume(yNorm) {
    return Math.min(1, Math.max(0, 1 - yNorm));
  }

  // Sort hand indices by wrist (0) x ascending: first = rightmost on mirrored display = pitch.
  function sortHandsPitchThenVolume(landmarksList) {
    const idx = landmarksList.map(function (_, i) { return i; });
    idx.sort(function (a, b) {
      return landmarksList[a][0].x - landmarksList[b][0].x;
    });
    return idx;
  }

  // Hand openness: avg distance palm (0) → fingertips [4,8,12,16,20], normalized by calibration.
  const FINGERTIP_IDS = [4, 8, 12, 16, 20];
  const OPEN_DIST_MIN = 0.05;
  const OPEN_DIST_MAX = 0.25;

  function euclid2d(a, b) {
    const dx = a.x - b.x;
    const dy = a.y - b.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  /** @param {Array<{x:number,y:number,z?:number}>} landmarks */
  function handOpennessNormalized(landmarks) {
    const palm = landmarks[0];
    let sum = 0;
    for (let i = 0; i < FINGERTIP_IDS.length; i++) {
      sum += euclid2d(palm, landmarks[FINGERTIP_IDS[i]]);
    }
    const avg = sum / FINGERTIP_IDS.length;
    const t = (avg - OPEN_DIST_MIN) / (OPEN_DIST_MAX - OPEN_DIST_MIN);
    return Math.min(1, Math.max(0, t));
  }

  // Expression: base pitch + (smoothOpen * 100) Hz; vibrato = sin(t*10) * smoothOpen * 20.
  const OPEN_PITCH_HZ = 100;
  const VIBRATO_RATE = 10;
  const VIBRATO_DEPTH_MAX = 20;

  // Dead zone + velocity-based alpha: smooth = prev*(1-a) + cur*a; a = 0.3 if fast else 0.05
  const DEAD_ZONE = 0.005;
  const VELOCITY_THRESH = 0.02;
  const ALPHA_FAST = 0.3;
  const ALPHA_SLOW = 0.05;
  const AUDIO_RAMP_S = 0.04;
  const AUDIO_RAMP_PITCH_SNAP_S = 0.08;
  const GAIN_FADE_OUT_S = 0.1;

  function adaptiveSmooth(prevRaw, currRaw, smooth) {
    const vel = Math.abs(currRaw - prevRaw);
    const input = vel < DEAD_ZONE ? prevRaw : currRaw;
    const alpha = vel > VELOCITY_THRESH ? ALPHA_FAST : ALPHA_SLOW;
    return smooth * (1 - alpha) + input * alpha;
  }

  /** @type {AudioContext | null} */
  let audioCtx = null;
  /** @type {OscillatorNode | null} */
  let osc = null;
  /** @type {GainNode | null} */
  let gainNode = null;
  let audioRunning = false;

  let prevRawPitchY = 0.5;
  let prevRawVolY = 0.5;
  let prevRawOpen = 0;
  let smoothPitchY = 0.5;
  let smoothVolY = 0.5;
  let smoothVol = 0;
  let smoothOpen = 0;
  let lastHandCount = 0;

  const video = document.getElementById('video');
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');
  const btnStart = document.getElementById('btnStart');
  const btnStop = document.getElementById('btnStop');
  const scaleLockEl = document.getElementById('scaleLock');
  const waveTypeEl = document.getElementById('waveType');
  const freqLine = document.getElementById('freqLine');
  const volLine = document.getElementById('volLine');
  const handLine = document.getElementById('handLine');
  const openLine = document.getElementById('openLine');

  function resizeCanvas() {
    const w = video.videoWidth || window.innerWidth;
    const h = video.videoHeight || window.innerHeight;
    if (w && h) {
      canvas.width = w;
      canvas.height = h;
    } else {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
  }

  window.addEventListener('resize', resizeCanvas);

  // Audio setup: one oscillator into a gain node; no sound until Start (unlocks AudioContext).
  function startAudio() {
    if (audioRunning) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0;
    osc = audioCtx.createOscillator();
    osc.type = waveTypeEl.value;
    const cont0 = continuousFreqFromY(smoothPitchY);
    const center0 = cont0 + smoothOpen * OPEN_PITCH_HZ;
    osc.frequency.value = scaleLockEl.checked ? snapToScale(center0, scale) : center0;
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audioRunning = true;
    btnStart.disabled = true;
    btnStop.disabled = false;
  }

  function stopAudio() {
    if (!audioRunning || !osc || !audioCtx) return;
    try {
      osc.stop();
      osc.disconnect();
    } catch (_) {}
    if (gainNode) gainNode.disconnect();
    audioCtx.close().catch(function () {});
    audioCtx = null;
    osc = null;
    gainNode = null;
    audioRunning = false;
    lastHandCount = 0;
    btnStart.disabled = false;
    btnStop.disabled = true;
  }

  waveTypeEl.addEventListener('change', function () {
    if (osc) osc.type = waveTypeEl.value;
  });

  btnStart.addEventListener('click', startAudio);
  btnStop.addEventListener('click', stopAudio);

  function applyAudioFromHands(pitchLm8, volLm8, handCount, pitchHandLandmarks, volHandLandmarks) {
    const scaleLock = scaleLockEl.checked;

    if (pitchHandLandmarks) {
      const currPitchY = avgStableY(pitchHandLandmarks);
      smoothPitchY = adaptiveSmooth(prevRawPitchY, currPitchY, smoothPitchY);
      prevRawPitchY = currPitchY;
    }

    if (handCount >= 2 && volHandLandmarks) {
      const currVolY = avgStableY(volHandLandmarks);
      smoothVolY = adaptiveSmooth(prevRawVolY, currVolY, smoothVolY);
      prevRawVolY = currVolY;
      smoothVol = yToRawVolume(smoothVolY);
    } else if (handCount === 1) {
      smoothVolY = adaptiveSmooth(prevRawVolY, 0.5, smoothVolY);
      prevRawVolY = 0.5;
      smoothVol = yToRawVolume(smoothVolY);
    } else {
      smoothVolY = adaptiveSmooth(prevRawVolY, 1, smoothVolY);
      prevRawVolY = 1;
      smoothVol = yToRawVolume(smoothVolY);
    }

    if (pitchHandLandmarks) {
      const currOpen = handOpennessNormalized(pitchHandLandmarks);
      smoothOpen = adaptiveSmooth(prevRawOpen, currOpen, smoothOpen);
      prevRawOpen = currOpen;
    } else {
      smoothOpen = adaptiveSmooth(prevRawOpen, 0, smoothOpen);
      prevRawOpen = 0;
    }

    const continuousHz = continuousFreqFromY(smoothPitchY);
    const centerHz = continuousHz + smoothOpen * OPEN_PITCH_HZ;
    const targetPitchHz = scaleLock ? snapToScale(centerHz, scale) : centerHz;
    freqLine.textContent =
      'Frequency: ' +
      targetPitchHz.toFixed(2) +
      ' Hz' +
      (scaleLock ? ' (C major)' : ' (continuous)');
    volLine.textContent = 'Volume: ' + smoothVol.toFixed(3);
    openLine.textContent = 'Open: ' + smoothOpen.toFixed(2);

    const hadHands = lastHandCount > 0;
    const handsLost = handCount === 0 && hadHands;
    lastHandCount = handCount;

    if (!audioRunning || !audioCtx || !osc || !gainNode) return;

    const now = audioCtx.currentTime;
    const vibrato = Math.sin(now * VIBRATO_RATE) * smoothOpen * VIBRATO_DEPTH_MAX;
    const finalHz = targetPitchHz + vibrato;
    const pitchRampS = scaleLock ? AUDIO_RAMP_PITCH_SNAP_S : AUDIO_RAMP_S;

    if (handsLost) {
      gainNode.gain.cancelScheduledValues(now);
      gainNode.gain.setValueAtTime(gainNode.gain.value, now);
      gainNode.gain.linearRampToValueAtTime(0, now + GAIN_FADE_OUT_S);
    } else if (handCount > 0) {
      gainNode.gain.cancelScheduledValues(now);
      gainNode.gain.setValueAtTime(gainNode.gain.value, now);
      gainNode.gain.linearRampToValueAtTime(smoothVol, now + AUDIO_RAMP_S);
    }

    osc.frequency.cancelScheduledValues(now);
    osc.frequency.setValueAtTime(osc.frequency.value, now);
    osc.frequency.linearRampToValueAtTime(finalHz, now + pitchRampS);
  }

  function drawFingerDotAt(lm8, glowInner, glowMid, core) {
    const w = canvas.width;
    const h = canvas.height;
    const px = (1 - lm8.x) * w;
    const py = lm8.y * h;

    const glow = ctx.createRadialGradient(px, py, 0, px, py, 28);
    glow.addColorStop(0, glowInner);
    glow.addColorStop(0.35, glowMid);
    glow.addColorStop(1, 'rgba(0, 0, 0, 0)');

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(px, py, 28, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = core;
    ctx.beginPath();
    ctx.arc(px, py, 8, 0, Math.PI * 2);
    ctx.fill();
  }

  // Hand mesh: thin lines + soft glow; pitch hand cyan, volume hand pink (matches sort order).
  const MESH_LINE_WIDTH = 0.9;
  const MESH_ALPHA_LINES = 0.52;
  const MESH_ALPHA_JOINTS = 0.48;
  const MESH_SHADOW_BLUR = 5;
  const MESH_PALETTE_PITCH = {
    line: 'rgb(105, 200, 210)',
    glow: 'rgba(110, 215, 225, 0.55)',
    joint: 'rgb(135, 225, 232)'
  };
  const MESH_PALETTE_VOL = {
    line: 'rgb(210, 140, 180)',
    glow: 'rgba(220, 150, 195, 0.5)',
    joint: 'rgb(228, 175, 210)'
  };

  function lmToScreen(lm, w, h) {
    return { x: (1 - lm.x) * w, y: lm.y * h };
  }

  /** Uses global HAND_CONNECTIONS from MediaPipe Hands. */
  function drawHandMesh(landmarks, palette) {
    const w = canvas.width;
    const h = canvas.height;
    const conn = typeof HAND_CONNECTIONS !== 'undefined' ? HAND_CONNECTIONS : [];
    ctx.save();
    ctx.globalAlpha = MESH_ALPHA_LINES;
    ctx.lineWidth = MESH_LINE_WIDTH;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = palette.line;
    ctx.shadowColor = palette.glow;
    ctx.shadowBlur = MESH_SHADOW_BLUR;
    ctx.beginPath();
    for (let i = 0; i < conn.length; i++) {
      const a = conn[i][0];
      const b = conn[i][1];
      const p0 = lmToScreen(landmarks[a], w, h);
      const p1 = lmToScreen(landmarks[b], w, h);
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = MESH_ALPHA_JOINTS;
    ctx.fillStyle = palette.joint;
    for (let j = 0; j < landmarks.length; j++) {
      const p = lmToScreen(landmarks[j], w, h);
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawFingerDots(pitchLm8, volLm8, handCount, list, order) {
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    if (audioRunning && list && handCount > 0 && order.length) {
      drawHandMesh(list[order[0]], MESH_PALETTE_PITCH);
      if (handCount >= 2) {
        drawHandMesh(list[order[1]], MESH_PALETTE_VOL);
      }
    }

    if (pitchLm8) {
      drawFingerDotAt(
        pitchLm8,
        'rgba(80, 255, 140, 0.95)',
        'rgba(40, 200, 100, 0.45)',
        'rgba(160, 255, 180, 0.95)'
      );
    }
    if (handCount >= 2 && volLm8) {
      drawFingerDotAt(
        volLm8,
        'rgba(100, 180, 255, 0.95)',
        'rgba(60, 120, 255, 0.45)',
        'rgba(180, 220, 255, 0.95)'
      );
    }
  }

  function onResults(results) {
    const list = results.multiHandLandmarks;
    const handCount = list ? list.length : 0;

    let pitchLm8 = null;
    let volLm8 = null;
    let pitchHandLandmarks = null;
    let volHandLandmarks = null;
    let order = [];

    if (handCount > 0) {
      order = sortHandsPitchThenVolume(list);
      pitchHandLandmarks = list[order[0]];
      pitchLm8 = pitchHandLandmarks[8];
      if (handCount >= 2) {
        volHandLandmarks = list[order[1]];
        volLm8 = volHandLandmarks[8];
      }
    }

    if (handCount === 0) {
      handLine.textContent = 'Hands: none (muted)';
    } else if (handCount === 1) {
      handLine.textContent = 'Hands: 1 — pitch only, volume fixed at 0.5';
    } else {
      handLine.textContent = 'Hands: 2 — green pitch · blue volume';
    }

    applyAudioFromHands(pitchLm8, volLm8, handCount, pitchHandLandmarks, volHandLandmarks);
    drawFingerDots(pitchLm8, volLm8, handCount, list, order);
  }

  const hands = new Hands({
    locateFile: function (file) {
      return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + file;
    }
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });
  hands.onResults(onResults);

  const camera = new Camera(video, {
    onFrame: async function () {
      await hands.send({ image: video });
    },
    width: 1280,
    height: 720
  });

  video.addEventListener('loadeddata', function () {
    resizeCanvas();
  });

  camera.start().catch(function (err) {
    handLine.textContent = 'Camera error: ' + (err && err.message ? err.message : String(err));
  });
})();
  </script>
</body>
</html>

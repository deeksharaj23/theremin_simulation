<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Theremin</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23141420' stroke='%23446688' stroke-width='1'/%3E%3C/svg%3E" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: block;
    }
    #hud {
      position: absolute;
      left: 1rem;
      top: 1rem;
      z-index: 2;
      pointer-events: none;
      text-shadow: 0 0 8px #000, 0 1px 2px #000;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    #controls {
      position: absolute;
      right: 1rem;
      bottom: 1rem;
      top: auto;
      left: auto;
      z-index: 2;
      pointer-events: none;
      max-width: min(100% - 2rem, 36rem);
    }
    .controls-panel {
      pointer-events: auto;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 0.5rem;
      padding: 0.55rem 0.65rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(14, 14, 24, 0.72);
      backdrop-filter: blur(10px);
      box-shadow:
        6px 6px 18px rgba(0, 0, 0, 0.28),
        0 0 0 1px rgba(0, 0, 0, 0.2);
    }
    .controls-row {
      display: flex;
      gap: 0.45rem;
      align-items: center;
      flex-shrink: 0;
    }
    #controls button,
    #controls label {
      cursor: pointer;
    }
    .icon-btn {
      width: 2.5rem;
      height: 2.5rem;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      background: rgba(20, 20, 35, 0.85);
      color: #fff;
    }
    .icon-btn:hover:not(:disabled) {
      background: rgba(40, 40, 70, 0.9);
    }
    .icon-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .icon-btn svg {
      display: block;
      flex-shrink: 0;
    }
    .control-field {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.45rem 0.65rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(20, 20, 35, 0.85);
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    .control-field-label {
      flex-shrink: 0;
      color: rgba(232, 232, 240, 0.92);
    }
    .control-field select {
      min-width: 5.5rem;
      padding: 0.4rem 0.55rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(12, 12, 22, 0.9);
      color: #fff;
      font-size: 0.85rem;
    }
    .toggle {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 0.65rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(20, 20, 35, 0.85);
      font-size: 0.85rem;
      user-select: none;
      flex-shrink: 0;
    }
    .toggle .lock-icon {
      flex-shrink: 0;
      opacity: 0.9;
    }
    .toggle input { accent-color: #7cf; }
    #hint {
      position: absolute;
      left: 50%;
      bottom: 6.25rem;
      transform: translateX(-50%);
      z-index: 1;
      font-size: 0.85rem;
      opacity: 0.7;
      text-shadow: 0 0 6px #000;
      pointer-events: none;
    }
    #learn-wrap {
      position: absolute;
      left: 1rem;
      bottom: 1rem;
      z-index: 100;
      pointer-events: auto;
      isolation: isolate;
      display: flex;
      flex-direction: column-reverse;
      gap: 0.4rem;
      align-items: stretch;
      max-width: min(100% - 2rem, 14rem);
    }
    #btnLearn {
      touch-action: manipulation;
      pointer-events: auto;
      padding: 0.45rem 0.75rem;
      font-size: 0.8rem;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(18, 18, 30, 0.55);
      color: rgba(240, 240, 248, 0.92);
      cursor: pointer;
      align-self: flex-start;
    }
    #btnLearn:hover {
      background: rgba(30, 30, 48, 0.65);
    }
    #btnLearn.learn-active {
      border-color: rgba(160, 200, 220, 0.35);
      color: rgba(200, 230, 245, 0.95);
    }
    .learn-panel {
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      padding: 0.55rem 0.6rem;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(12, 12, 22, 0.78);
      backdrop-filter: blur(12px);
    }
    .learn-panel.hidden {
      display: none;
    }
    .learn-panel button {
      touch-action: manipulation;
      text-align: left;
      padding: 0.4rem 0.55rem;
      font-size: 0.8rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(24, 24, 38, 0.75);
      color: rgba(232, 232, 242, 0.95);
      cursor: pointer;
    }
    .learn-panel button:hover {
      background: rgba(38, 38, 56, 0.85);
    }
    #calibration-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(6, 6, 12, 0.88);
      backdrop-filter: blur(8px);
      pointer-events: auto;
    }
    #calibration-overlay.hidden {
      display: none;
    }
    .cal-card {
      max-width: 22rem;
      padding: 1.25rem 1.35rem;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(18, 18, 32, 0.95);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }
    .cal-card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #e8e8f8;
    }
    .cal-card p {
      font-size: 0.88rem;
      line-height: 1.45;
      color: rgba(232, 232, 242, 0.88);
      margin-bottom: 1rem;
    }
    .cal-card .cal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }
    .cal-card button {
      padding: 0.45rem 0.85rem;
      font-size: 0.85rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(32, 40, 72, 0.9);
      color: #fff;
      cursor: pointer;
    }
    .cal-card button:hover {
      background: rgba(48, 56, 96, 0.95);
    }
    .cal-card button.secondary {
      background: rgba(40, 40, 52, 0.75);
      border-color: rgba(255, 255, 255, 0.12);
    }
    #pitch-strip {
      position: absolute;
      left: 50%;
      bottom: 6.25rem;
      transform: translateX(-50%);
      width: min(92vw, 520px);
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(60, 120, 255, 0.45), rgba(255, 120, 220, 0.35));
      z-index: 3;
      pointer-events: none;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.35);
    }
    #pitch-strip .pitch-mark {
      position: absolute;
      top: 50%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      margin-left: 0;
      box-shadow: 0 0 12px currentColor;
    }
    #pitch-strip .pitch-mark.you {
      background: rgba(120, 255, 160, 0.95);
      color: rgba(120, 255, 160, 0.95);
      z-index: 2;
    }
    #pitch-strip .pitch-mark.ghost {
      background: rgba(255, 255, 255, 0.55);
      color: rgba(255, 255, 255, 0.6);
      z-index: 1;
    }
    #pitch-strip .pitch-mark.ghost.hidden {
      display: none;
    }
    .meter-row {
      font-size: 0.82rem;
      opacity: 0.92;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="app">
    <video id="video" playsinline></video>
    <canvas id="overlay"></canvas>
    <div id="pitch-strip" aria-hidden="true">
      <span id="pitchMarkYou" class="pitch-mark you" style="left: 50%"></span>
      <span id="pitchMarkGhost" class="pitch-mark ghost hidden" style="left: 50%"></span>
    </div>
    <div id="hud">
      <div id="freqLine">Frequency: — Hz</div>
      <div id="volLine">Volume: —</div>
      <div id="handLine">Hand: —</div>
      <div id="openLine">Open: —</div>
      <div id="modeLine" class="meter-row">Mode: —</div>
      <div id="intentLine" class="meter-row">Intent: —</div>
      <div id="featureLine" class="meter-row">Open / Spread / Curve / Stability: —</div>
    </div>
    <p id="hint">Pitch: index X (horizontal line) · right hand = pitch, left = volume · Learn mode: C Major snap on by default</p>
    <div id="learn-wrap">
      <button type="button" id="btnLearn">Learn to play</button>
      <div id="learn-panel" class="learn-panel hidden" role="dialog" aria-label="Choose a melody">
        <button type="button" class="learn-song" data-song="sargam">Sa Re Ga Ma Pa</button>
        <button type="button" class="learn-song" data-song="birthday">Happy Birthday</button>
      </div>
    </div>
    <div id="controls">
      <div class="controls-panel">
        <div class="controls-row">
          <button type="button" id="btnStart" class="icon-btn" aria-label="Start" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button type="button" id="btnStop" class="icon-btn" aria-label="Stop" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 6h12v12H6z"/></svg>
          </button>
        </div>
        <label class="toggle">
          <input type="checkbox" id="scaleLock" checked />
          <svg class="lock-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="5" y="11" width="14" height="10" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <span>C Major</span>
        </label>
        <div class="control-field">
          <span class="control-field-label">Wave</span>
          <select id="waveType" aria-label="Waveform">
            <option value="sine" selected>sine</option>
            <option value="triangle">triangle</option>
            <option value="sawtooth">sawtooth</option>
          </select>
        </div>
        <button type="button" id="btnRecalibrate" class="control-field" style="cursor:pointer;border-radius:8px;font-size:0.85rem;">
          Calibrate
        </button>
      </div>
    </div>
  </div>

  <div id="calibration-overlay" role="dialog" aria-labelledby="cal-title" aria-modal="true">
    <div class="cal-card">
      <h2 id="cal-title">Instrument calibration</h2>
      <p id="cal-instruction"></p>
      <div class="cal-actions">
        <button type="button" id="cal-capture">Capture</button>
        <button type="button" id="cal-skip" class="secondary">skip (defaults)</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script>
(function () {
  'use strict';

  /*
   * INPUT → FEATURES → INTENT → SOUND (single MediaPipe onResults; learn/ghost never override real landmarks)
   * Pitch anchor: index tip (8) X only — not finger-mapped to discrete notes.
   * Tone.js: Synth → Filter → Gain → destination; learn guide is separate Tone oscillator.
   */

  const DEBUG_PIPELINE =
    typeof localStorage !== 'undefined' && localStorage.getItem('thereminDebug') === '1';
  let debugFrameCounter = 0;

  const scale = [
    130.81, 146.83, 164.81, 174.61, 196.00, 220.00, 246.94,
    261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88
  ];

  const PITCH_MIN = 200;
  const PITCH_MAX = 1200;
  const INDEX_TIP = 8;
  const THUMB_TIP = 4;
  const PINKY_TIP = 20;
  const PITCH_LERP_BASE = 0.12;
  const MICRO_TUNE_HZ = 45;
  const VIBRATO_SPEED = 5.5;
  const JITTER_RING = 16;
  const VEL_FAST = 0.08;
  const HOLD_STAB_THRESH = 2.2;
  const HOLD_VEL_THRESH = 0.012;
  const TRANS_VEL_LOW = 0.018;
  const TRANS_VEL_HIGH = 0.07;
  const CURVE_DAMP = 0.35;
  const FILTER_MIN = 500;
  const FILTER_MAX = 5200;
  const GAIN_RAMP_FAST = 0.02;
  const GAIN_RAMP_SLOW = 0.12;

  /** @type {{ spreadMin:number, spreadMax:number, openMin:number, openMax:number, curvatureBaseline:number, pitchXMin:number, pitchXMax:number }} */
  let cal = {
    spreadMin: 0.02,
    spreadMax: 0.38,
    openMin: 0.02,
    openMax: 0.24,
    curvatureBaseline: 2.15,
    pitchXMin: 0.12,
    pitchXMax: 0.88
  };

  function loadCalFromStorage() {
    try {
      const s = localStorage.getItem('thereminCal');
      if (s) {
        const o = JSON.parse(s);
        if (o && typeof o === 'object') {
          cal = Object.assign({}, cal, o);
        }
      }
    } catch (_) {}
  }
  function saveCalToStorage() {
    try {
      localStorage.setItem('thereminCal', JSON.stringify(cal));
    } catch (_) {}
  }

  const STABLE_Y_IDS = [5, 9, 13];

  function avgStableY(landmarks) {
    if (!landmarks || !landmarks[STABLE_Y_IDS[2]]) return 0.5;
    const y =
      (landmarks[STABLE_Y_IDS[0]].y +
        landmarks[STABLE_Y_IDS[1]].y +
        landmarks[STABLE_Y_IDS[2]].y) /
      3;
    if (!Number.isFinite(y)) return 0.5;
    return Math.min(1, Math.max(0, y));
  }

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function norm01(v, lo, hi) {
    if (!Number.isFinite(v)) return 0.5;
    if (hi <= lo) return 0.5;
    return Math.min(1, Math.max(0, (v - lo) / (hi - lo)));
  }

  /** Map index X (camera space 0–1) to Hz; left→right = low→high */
  function hzFromPitchX(xNorm) {
    const x = Number.isFinite(xNorm) ? Math.min(1, Math.max(0, xNorm)) : 0.5;
    const t = norm01(x, cal.pitchXMin, cal.pitchXMax);
    const hz = PITCH_MIN + t * (PITCH_MAX - PITCH_MIN);
    return Number.isFinite(hz) ? hz : PITCH_MIN;
  }

  /** Normalized X (0–1) where pitch strip matches: 0 = low freq, 1 = high freq */
  function normXFromHz(freqHz) {
    const t = (freqHz - PITCH_MIN) / (PITCH_MAX - PITCH_MIN);
    const x = cal.pitchXMin + Math.min(1, Math.max(0, t)) * (cal.pitchXMax - cal.pitchXMin);
    return Math.min(1, Math.max(0, x));
  }

  function angleAtB(a, b, c) {
    const abx = a.x - b.x;
    const aby = a.y - b.y;
    const cbx = c.x - b.x;
    const cby = c.y - b.y;
    const dot = abx * cbx + aby * cby;
    const m = Math.sqrt(abx * abx + aby * aby) * Math.sqrt(cbx * cbx + cby * cby);
    if (m < 1e-9) return Math.PI;
    return Math.acos(Math.min(1, Math.max(-1, dot / m)));
  }

  function fingerCurvatureAvg(lm) {
    if (!lm || !lm[20]) return cal.curvatureBaseline;
    const angles = [
      angleAtB(lm[5], lm[6], lm[8]),
      angleAtB(lm[9], lm[10], lm[12]),
      angleAtB(lm[13], lm[14], lm[16]),
      angleAtB(lm[17], lm[18], lm[20])
    ];
    let s = 0;
    for (let i = 0; i < angles.length; i++) s += angles[i];
    const avg = s / angles.length;
    return Number.isFinite(avg) ? avg : cal.curvatureBaseline;
  }

  function stdDevRing(buf) {
    const n = buf.length;
    if (n < 2) return 0;
    let mean = 0;
    for (let i = 0; i < n; i++) mean += buf[i];
    mean /= n;
    let v = 0;
    for (let i = 0; i < n; i++) {
      const d = buf[i] - mean;
      v += d * d;
    }
    return Math.sqrt(v / n);
  }

  const NOTE_FREQ = {
    C: 261.63, D: 293.66, E: 329.63, F: 349.23, G: 392.0, A: 440.0, B: 493.88
  };

  function buildSong(notes) {
    let totalMs = 0;
    for (let i = 0; i < notes.length; i++) totalMs += notes[i].duration;
    return { notes: notes, totalMs: totalMs };
  }

  const SONGS = {
    sargam: buildSong([
      { note: 'C', duration: 720 }, { note: 'D', duration: 680 }, { note: 'E', duration: 760 },
      { note: 'F', duration: 640 }, { note: 'G', duration: 1100 }
    ]),
    birthday: buildSong([
      { note: 'C', duration: 420 }, { note: 'C', duration: 200 }, { note: 'D', duration: 700 }, { note: 'C', duration: 700 },
      { note: 'F', duration: 700 }, { note: 'E', duration: 800 },
      { note: 'C', duration: 420 }, { note: 'C', duration: 200 }, { note: 'D', duration: 700 }, { note: 'C', duration: 700 },
      { note: 'G', duration: 700 }, { note: 'F', duration: 1000 }
    ])
  };

  const LEARN_ALIGN_THRESH = 0.05;
  const GHOST_SMOOTH = 0.1;
  const GUIDE_FREQ_RAMP_S = 0.16;

  function snapToScale(freq, scaleArr) {
    if (!Number.isFinite(freq)) return scaleArr[0];
    let closest = scaleArr[0];
    let minDiff = Math.abs(freq - closest);
    for (let note of scaleArr) {
      const diff = Math.abs(freq - note);
      if (diff < minDiff) {
        closest = note;
        minDiff = diff;
      }
    }
    return closest;
  }

  // Volume hand: Y-axis inverted — top of frame (y→0) = louder, bottom (y→1) = quieter.
  function yToRawVolume(yNorm) {
    return Math.min(1, Math.max(0, 1 - yNorm));
  }

  // Sort hand indices by wrist (0) x ascending: first = rightmost on mirrored display = pitch.
  function sortHandsPitchThenVolume(landmarksList) {
    const idx = landmarksList.map(function (_, i) { return i; });
    idx.sort(function (a, b) {
      return landmarksList[a][0].x - landmarksList[b][0].x;
    });
    return idx;
  }

  const FINGERTIP_IDS = [4, 8, 12, 16, 20];

  function euclid2d(a, b) {
    const dx = a.x - b.x;
    const dy = a.y - b.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function pinchOpennessRaw(lm) {
    if (!lm || !lm[8]) return 0;
    return euclid2d(lm[4], lm[8]);
  }

  function spreadIndexPinkyRaw(lm) {
    if (!lm || !lm[20]) return 0;
    return euclid2d(lm[8], lm[20]);
  }

  const DEAD_ZONE = 0.005;
  const VELOCITY_THRESH = 0.02;
  const ALPHA_FAST = 0.3;
  const ALPHA_SLOW = 0.05;
  const AUDIO_RAMP_S = 0.04;
  const AUDIO_RAMP_PITCH_SNAP_S = 0.08;
  const GAIN_FADE_OUT_S = 0.1;

  function adaptiveSmooth(prevRaw, currRaw, smooth) {
    if (!Number.isFinite(currRaw) || !Number.isFinite(prevRaw)) {
      return Number.isFinite(smooth) ? smooth : 0.5;
    }
    const vel = Math.abs(currRaw - prevRaw);
    const input = vel < DEAD_ZONE ? prevRaw : currRaw;
    const alpha = vel > VELOCITY_THRESH ? ALPHA_FAST : ALPHA_SLOW;
    const out = smooth * (1 - alpha) + input * alpha;
    return Number.isFinite(out) ? Math.min(1, Math.max(0, out)) : smooth;
  }

  /** @type {Tone.Synth | null} */
  let synth = null;
  /** @type {Tone.Filter | null} */
  let filterNode = null;
  /** @type {Tone.Gain | null} */
  let mainGain = null;
  /** @type {Tone.Oscillator | null} */
  let guideOsc = null;
  /** @type {Tone.Gain | null} */
  let guideGain = null;
  let audioRunning = false;

  let rawPitchHz = 550;
  let smoothPitchHz = 550;
  let smoothPitchNormX = 0.5;
  let prevRawPitchX = 0.5;
  let prevRawVolY = 0.5;
  let prevRawOpen = 0;
  let smoothVolY = 0.5;
  let smoothVol = 0;
  let smoothOpen = 0;
  let smoothSpread = 0;
  let smoothCurvature = 0;
  let prevRawSpread = 0.5;
  let prevRawCurve = 2.0;
  let lastHandCount = 0;

  let pitchJitterBuf = [];
  let prevAnchorX = 0.5;
  let prevAnchorY = 0.5;
  let prevTips = null;
  /** Latest pitch-hand landmarks for calibration capture */
  let lastPitchLandmarks = null;
  let lastFrameTime = 0;
  let handVelocity = 0;
  let transitionCooldown = 0;

  let displayMode = 'NEUTRAL';
  let displayIntent = '—';

  let learnModeActive = false;
  /** @type {{ notes: Array<{note:string,duration:number}>, totalMs: number } | null} */
  let currentSong = null;
  let songStartTime = 0;
  let ghostX = 0.5;
  let learnTargetX = 0.5;
  let lastLearnSegmentStartMs = -1;

  const video = document.getElementById('video');
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');
  const btnStart = document.getElementById('btnStart');
  const btnStop = document.getElementById('btnStop');
  const scaleLockEl = document.getElementById('scaleLock');
  const waveTypeEl = document.getElementById('waveType');
  const freqLine = document.getElementById('freqLine');
  const volLine = document.getElementById('volLine');
  const handLine = document.getElementById('handLine');
  const openLine = document.getElementById('openLine');
  const modeLine = document.getElementById('modeLine');
  const intentLine = document.getElementById('intentLine');
  const featureLine = document.getElementById('featureLine');
  const btnLearn = document.getElementById('btnLearn');
  const learnPanel = document.getElementById('learn-panel');
  const calOverlay = document.getElementById('calibration-overlay');
  const calInstruction = document.getElementById('cal-instruction');
  const calCapture = document.getElementById('cal-capture');
  const calSkip = document.getElementById('cal-skip');
  const btnRecalibrate = document.getElementById('btnRecalibrate');
  const pitchMarkYou = document.getElementById('pitchMarkYou');
  const pitchMarkGhost = document.getElementById('pitchMarkGhost');

  function resizeCanvas() {
    const w = video.videoWidth || window.innerWidth;
    const h = video.videoHeight || window.innerHeight;
    if (w && h) {
      canvas.width = w;
      canvas.height = h;
    } else {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
  }

  window.addEventListener('resize', resizeCanvas);

  function stopGuideAudio() {
    if (guideOsc) {
      try {
        guideOsc.stop();
        guideOsc.dispose();
      } catch (_) {}
      guideOsc = null;
    }
    if (guideGain) {
      try {
        guideGain.dispose();
      } catch (_) {}
      guideGain = null;
    }
  }

  function exitLearnMode() {
    learnModeActive = false;
    currentSong = null;
    lastLearnSegmentStartMs = -1;
    stopGuideAudio();
    if (pitchMarkGhost) pitchMarkGhost.classList.add('hidden');
    if (btnLearn) btnLearn.classList.remove('learn-active');
    if (learnPanel) learnPanel.classList.add('hidden');
  }

  function ensureGuideAudio() {
    if (!audioRunning || guideOsc) return;
    guideGain = new Tone.Gain(0).toDestination();
    guideOsc = new Tone.Oscillator(440, 'sine').connect(guideGain);
    guideOsc.start();
  }

  function getCurrentLearnSegment() {
    if (!currentSong) return null;
    const elapsedMs = (Tone.now() - songStartTime) * 1000;
    const total = currentSong.totalMs;
    const t = ((elapsedMs % total) + total) % total;
    let acc = 0;
    const notes = currentSong.notes;
    for (let i = 0; i < notes.length; i++) {
      const n = notes[i];
      if (t < acc + n.duration) {
        return { note: n, startMs: acc, freq: NOTE_FREQ[n.note] };
      }
      acc += n.duration;
    }
    return { note: notes[0], startMs: 0, freq: NOTE_FREQ[notes[0].note] };
  }

  function updateLearnPlayback() {
    if (!learnModeActive || !currentSong) return;
    const seg = getCurrentLearnSegment();
    if (!seg) return;
    learnTargetX = normXFromHz(seg.freq);
    ghostX = ghostX * (1 - GHOST_SMOOTH) + learnTargetX * GHOST_SMOOTH;
    if (pitchMarkGhost) {
      pitchMarkGhost.classList.remove('hidden');
      pitchMarkGhost.style.left = (ghostX * 100).toFixed(2) + '%';
    }
    if (guideOsc && guideGain && seg.startMs !== lastLearnSegmentStartMs) {
      lastLearnSegmentStartMs = seg.startMs;
      guideOsc.frequency.rampTo(seg.freq, GUIDE_FREQ_RAMP_S);
      guideGain.gain.rampTo(0.11, 0.06);
    }
  }

  function launchLearn(song) {
    stopGuideAudio();
    lastLearnSegmentStartMs = -1;
    learnModeActive = true;
    currentSong = song;
    songStartTime = Tone.now();
    const first = NOTE_FREQ[song.notes[0].note];
    ghostX = normXFromHz(first);
    learnTargetX = ghostX;
    ensureGuideAudio();
    if (btnLearn) btnLearn.classList.add('learn-active');
    if (guideOsc && guideGain) {
      guideOsc.frequency.value = first;
      guideGain.gain.value = 0;
      guideGain.gain.rampTo(0.11, 0.08);
    }
    if (pitchMarkGhost) {
      pitchMarkGhost.classList.remove('hidden');
      pitchMarkGhost.style.left = (ghostX * 100).toFixed(2) + '%';
    }
    lastLearnSegmentStartMs = 0;
  }

  async function startLearnSong(songId) {
    const song = SONGS[songId];
    if (!song) return;
    if (!audioRunning) {
      await startAudio();
    }
    if (!synth) return;
    await Tone.start();
    launchLearn(song);
  }

  async function startAudio() {
    if (audioRunning) return;
    await Tone.start();
    if (Tone.context.state !== 'running') {
      try {
        await Tone.context.resume();
      } catch (_) {}
    }
    synth = new Tone.Synth({
      oscillator: { type: waveTypeEl.value },
      envelope: { attack: 0.08, decay: 0.25, sustain: 1, release: 0.65 }
    });
    filterNode = new Tone.Filter(1800, 'lowpass');
    mainGain = new Tone.Gain(0).toDestination();
    synth.connect(filterNode);
    filterNode.connect(mainGain);
    const startHz = Math.max(PITCH_MIN, Math.min(PITCH_MAX, smoothPitchHz));
    synth.triggerAttack(startHz);
    audioRunning = true;
    btnStart.disabled = true;
    btnStop.disabled = false;
  }

  function stopAudio() {
    if (!audioRunning || !synth) return;
    exitLearnMode();
    try {
      synth.triggerRelease();
    } catch (_) {}
    try {
      synth.dispose();
      filterNode.dispose();
      mainGain.dispose();
    } catch (_) {}
    synth = null;
    filterNode = null;
    mainGain = null;
    audioRunning = false;
    lastHandCount = 0;
    btnStart.disabled = false;
    btnStop.disabled = true;
  }

  waveTypeEl.addEventListener('change', function () {
    if (synth && synth.oscillator) {
      synth.oscillator.type = waveTypeEl.value;
    }
  });

  btnStart.addEventListener('click', startAudio);
  btnStop.addEventListener('click', stopAudio);

  function ensureAudioRunning() {
    if (typeof Tone !== 'undefined' && Tone.context && Tone.context.state === 'suspended') {
      Tone.start().catch(function () {});
    }
  }
  document.addEventListener('click', ensureAudioRunning, true);
  document.addEventListener('touchstart', ensureAudioRunning, { passive: true, capture: true });

  btnLearn.addEventListener('click', function () {
    if (learnModeActive) {
      exitLearnMode();
      return;
    }
    learnPanel.classList.toggle('hidden');
  });

  document.querySelectorAll('.learn-song').forEach(function (el) {
    el.addEventListener('click', function () {
      const id = el.getAttribute('data-song');
      startLearnSong(id).then(function () {
        learnPanel.classList.add('hidden');
      }).catch(function () {});
    });
  });

  /**
   * REAL landmarks only → features → intent → Tone mapping (never ghost/learn).
   */
  function applyAudioFromHands(pitchLm8, volLm8, handCount, pitchHandLandmarks, volHandLandmarks) {
    const scaleLock = scaleLockEl.checked;
    const nowMs = performance.now();
    const dt = lastFrameTime > 0 ? Math.max(0.005, (nowMs - lastFrameTime) / 1000) : 0.033;
    lastFrameTime = nowMs;

    let jitter = 0;

    if (pitchHandLandmarks) {
      const ax = pitchHandLandmarks[INDEX_TIP].x;
      const ay = pitchHandLandmarks[INDEX_TIP].y;
      rawPitchHz = hzFromPitchX(ax);
      smoothPitchNormX = adaptiveSmooth(prevRawPitchX, ax, smoothPitchNormX);
      prevRawPitchX = ax;

      pitchJitterBuf.push(ax);
      if (pitchJitterBuf.length > JITTER_RING) pitchJitterBuf.shift();
      jitter = pitchJitterBuf.length >= 3 ? stdDevRing(pitchJitterBuf) : 0;

      const dist = Math.hypot(ax - prevAnchorX, ay - prevAnchorY);
      handVelocity = dist / (dt + 1e-6);
      prevAnchorX = ax;
      prevAnchorY = ay;

      const pinchR = pinchOpennessRaw(pitchHandLandmarks);
      const spreadR = spreadIndexPinkyRaw(pitchHandLandmarks);
      const nOpen = norm01(pinchR, cal.openMin, cal.openMax);
      const nSpreadRaw = norm01(spreadR, cal.spreadMin, cal.spreadMax);
      smoothOpen = adaptiveSmooth(prevRawOpen, nOpen, smoothOpen);
      prevRawOpen = nOpen;
      smoothSpread = adaptiveSmooth(prevRawSpread, nSpreadRaw, smoothSpread);
      prevRawSpread = nSpreadRaw;

      const curRaw = fingerCurvatureAvg(pitchHandLandmarks);
      smoothCurvature = adaptiveSmooth(prevRawCurve, curRaw, smoothCurvature);
      prevRawCurve = curRaw;

      prevTips = FINGERTIP_IDS.map(function (id) {
        return { x: pitchHandLandmarks[id].x, y: pitchHandLandmarks[id].y };
      });
    } else {
      pitchJitterBuf.length = 0;
      smoothOpen = adaptiveSmooth(prevRawOpen, 0, smoothOpen);
      prevRawOpen = 0;
      prevTips = null;
    }

    if (handCount >= 2 && volHandLandmarks) {
      const currVolY = avgStableY(volHandLandmarks);
      smoothVolY = adaptiveSmooth(prevRawVolY, currVolY, smoothVolY);
      prevRawVolY = currVolY;
      smoothVol = yToRawVolume(smoothVolY);
    } else if (handCount === 1) {
      smoothVolY = adaptiveSmooth(prevRawVolY, 0.5, smoothVolY);
      prevRawVolY = 0.5;
      smoothVol = yToRawVolume(smoothVolY);
    } else {
      smoothVolY = adaptiveSmooth(prevRawVolY, 1, smoothVolY);
      prevRawVolY = 1;
      smoothVol = yToRawVolume(smoothVolY);
    }

    const stab = pitchHandLandmarks
      ? 1 / (jitter * 18 + handVelocity * 0.28 + 0.02)
      : 0;

    let mode = 'NEUTRAL';
    if (smoothOpen < 0.2) mode = 'PRECISION';
    else if (smoothSpread > 0.68) mode = 'EXPRESSIVE';
    else if (smoothCurvature > cal.curvatureBaseline + 0.35) mode = 'VIBRATO_READY';
    displayMode = mode;

    let intent = 'EXPLORE';
    if (stab > HOLD_STAB_THRESH && handVelocity < HOLD_VEL_THRESH) intent = 'HOLD_NOTE';
    else if (handVelocity > TRANS_VEL_LOW && handVelocity < TRANS_VEL_HIGH) {
      intent = 'TRANSITION';
      transitionCooldown = 14;
    } else if (jitter > 0.007 && stab < 5) intent = 'VIBRATO';
    else if (handVelocity > VEL_FAST) intent = 'ATTACK';
    displayIntent = intent;

    if (transitionCooldown > 0) transitionCooldown--;

    let alpha = PITCH_LERP_BASE;
    if (intent === 'HOLD_NOTE') alpha *= 0.42;
    if (mode === 'PRECISION') alpha *= 0.62;
    if (stab > 1.2) alpha *= 0.72 / Math.min(stab, 4);
    if (pitchHandLandmarks) {
      smoothPitchHz = lerp(smoothPitchHz, rawPitchHz, alpha);
    }

    const microRange = mode === 'EXPRESSIVE' ? 58 : MICRO_TUNE_HZ;
    let micro = (smoothOpen - 0.5) * microRange * 2;
    if (mode === 'PRECISION') micro *= 0.45;

    let baseHz = smoothPitchHz + micro;
    if (scaleLock && intent !== 'TRANSITION') {
      baseHz = snapToScale(baseHz, scale);
    }

    const vibAmt = jitter * (mode === 'VIBRATO_READY' || intent === 'VIBRATO' ? 220 : 85);
    const phase = nowMs * 0.001 * VIBRATO_SPEED * Math.PI * 2;
    let outHz = baseHz + Math.sin(phase) * vibAmt;
    if (!Number.isFinite(outHz)) outHz = PITCH_MIN;

    const normCurve = norm01(smoothCurvature, cal.curvatureBaseline - 0.2, cal.curvatureBaseline + 0.85);
    const curveDamp = 1 - normCurve * CURVE_DAMP;

    freqLine.textContent =
      'Frequency: ' + outHz.toFixed(2) + ' Hz' + (scaleLock ? ' (C major)' : ' (continuous)');
    volLine.textContent = 'Volume: ' + smoothVol.toFixed(3);
    openLine.textContent =
      'Pinch/spread: ' + smoothOpen.toFixed(2) + ' / ' + smoothSpread.toFixed(2) + ' · curve ' + smoothCurvature.toFixed(2);
    modeLine.textContent = 'Mode: ' + mode;
    intentLine.textContent = 'Intent: ' + intent;
    featureLine.textContent =
      'Stability ' + stab.toFixed(2) + ' · jitter ' + jitter.toFixed(4) + ' · vel ' + handVelocity.toFixed(3);

    if (pitchMarkYou) pitchMarkYou.style.left = (smoothPitchNormX * 100).toFixed(2) + '%';

    const hadHands = lastHandCount > 0;
    const handsLost = handCount === 0 && hadHands;
    lastHandCount = handCount;

    if (!audioRunning || !synth || !filterNode || !mainGain) return;

    if (Tone.context.state === 'suspended') {
      Tone.context.resume().catch(function () {});
    }

    const volClamped = Number.isFinite(smoothVol) ? Math.min(1, Math.max(0, smoothVol)) : 0;
    let gainVol = handCount >= 2 ? Math.max(0.14, volClamped) : volClamped;
    gainVol *= curveDamp;

    const fLo = mode === 'EXPRESSIVE' ? FILTER_MIN : FILTER_MIN + 200;
    const fHi = mode === 'EXPRESSIVE' ? FILTER_MAX : FILTER_MAX - 600;
    const fTarget = lerp(fLo, fHi, smoothSpread);
    filterNode.frequency.rampTo(fTarget, 0.05);

    synth.envelope.attack = handVelocity > VEL_FAST ? 0.01 : 0.2;

    const rampT = intent === 'ATTACK' || handVelocity > VEL_FAST ? GAIN_RAMP_FAST : GAIN_RAMP_SLOW;

    if (handsLost) {
      mainGain.gain.rampTo(0, GAIN_FADE_OUT_S);
    } else if (handCount > 0) {
      mainGain.gain.rampTo(gainVol, rampT);
    }

    synth.frequency.rampTo(outHz, AUDIO_RAMP_PITCH_SNAP_S);
  }

  function drawFingerDotAt(lm8, glowInner, glowMid, core) {
    const w = canvas.width;
    const h = canvas.height;
    const px = (1 - lm8.x) * w;
    const py = lm8.y * h;

    const glow = ctx.createRadialGradient(px, py, 0, px, py, 28);
    glow.addColorStop(0, glowInner);
    glow.addColorStop(0.35, glowMid);
    glow.addColorStop(1, 'rgba(0, 0, 0, 0)');

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(px, py, 28, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = core;
    ctx.beginPath();
    ctx.arc(px, py, 8, 0, Math.PI * 2);
    ctx.fill();
  }

  // Hand mesh: thin lines + soft glow; pitch hand cyan, volume hand pink (matches sort order).
  const MESH_LINE_WIDTH = 0.9;
  const MESH_ALPHA_LINES = 0.52;
  const MESH_ALPHA_JOINTS = 0.48;
  const MESH_SHADOW_BLUR = 5;
  const MESH_PALETTE_PITCH = {
    line: 'rgb(105, 200, 210)',
    glow: 'rgba(110, 215, 225, 0.55)',
    joint: 'rgb(135, 225, 232)'
  };
  const MESH_PALETTE_VOL = {
    line: 'rgb(210, 140, 180)',
    glow: 'rgba(220, 150, 195, 0.5)',
    joint: 'rgb(228, 175, 210)'
  };

  function lmToScreen(lm, w, h) {
    return { x: (1 - lm.x) * w, y: lm.y * h };
  }

  /** Ghost target follows horizontal pitch (learnTargetX / ghostX); vertical band fixed for visibility */
  function drawGhostHand(aligned) {
    const w = canvas.width;
    const h = canvas.height;
    const px = (1 - ghostX) * w;
    const py = 0.42 * h;
    const base = 0.24;
    const opacity = aligned ? 0.29 : base;
    const tint = aligned ? [188, 228, 205] : [232, 234, 240];
    ctx.save();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = opacity * 0.55;
    ctx.strokeStyle = 'rgba(' + tint[0] + ',' + tint[1] + ',' + tint[2] + ',0.35)';
    ctx.lineWidth = 0.75;
    ctx.beginPath();
    ctx.arc(px, py + 22, 27, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = aligned ? 16 : 12;
    ctx.shadowColor = aligned ? 'rgba(160, 200, 175, 0.35)' : 'rgba(220, 226, 236, 0.22)';
    ctx.globalAlpha = opacity;
    const g = ctx.createRadialGradient(px, py, 0, px, py, 12);
    g.addColorStop(0, 'rgba(' + tint[0] + ',' + tint[1] + ',' + tint[2] + ',0.55)');
    g.addColorStop(0.65, 'rgba(' + tint[0] + ',' + tint[1] + ',' + tint[2] + ',0.22)');
    g.addColorStop(1, 'rgba(' + tint[0] + ',' + tint[1] + ',' + tint[2] + ',0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(px, py, 11, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawHandMesh(landmarks, palette) {
    const w = canvas.width;
    const h = canvas.height;
    const conn = typeof HAND_CONNECTIONS !== 'undefined' ? HAND_CONNECTIONS : [];
    ctx.save();
    ctx.globalAlpha = MESH_ALPHA_LINES;
    ctx.lineWidth = MESH_LINE_WIDTH;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = palette.line;
    ctx.shadowColor = palette.glow;
    ctx.shadowBlur = MESH_SHADOW_BLUR;
    ctx.beginPath();
    for (let i = 0; i < conn.length; i++) {
      const a = conn[i][0];
      const b = conn[i][1];
      const p0 = lmToScreen(landmarks[a], w, h);
      const p1 = lmToScreen(landmarks[b], w, h);
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = MESH_ALPHA_JOINTS;
    ctx.fillStyle = palette.joint;
    for (let j = 0; j < landmarks.length; j++) {
      const p = lmToScreen(landmarks[j], w, h);
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawFingerDots(pitchLm8, volLm8, handCount, list, order, learnAligned) {
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    if (learnModeActive && currentSong) {
      drawGhostHand(learnAligned);
    }

    if (list && handCount > 0 && order.length) {
      drawHandMesh(list[order[0]], MESH_PALETTE_PITCH);
      if (handCount >= 2) {
        drawHandMesh(list[order[1]], MESH_PALETTE_VOL);
      }
    }

    if (pitchLm8) {
      drawFingerDotAt(
        pitchLm8,
        'rgba(80, 255, 140, 0.95)',
        'rgba(40, 200, 100, 0.45)',
        'rgba(160, 255, 180, 0.95)'
      );
    }
    if (handCount >= 2 && volLm8) {
      drawFingerDotAt(
        volLm8,
        'rgba(100, 180, 255, 0.95)',
        'rgba(60, 120, 255, 0.45)',
        'rgba(180, 220, 255, 0.95)'
      );
    }
  }

  function onResults(results) {
    const list = results.multiHandLandmarks;
    const handCount = list ? list.length : 0;

    let pitchLm8 = null;
    let volLm8 = null;
    let pitchHandLandmarks = null;
    let volHandLandmarks = null;
    let order = [];

    if (handCount > 0) {
      order = sortHandsPitchThenVolume(list);
      pitchHandLandmarks = list[order[0]];
      pitchLm8 = pitchHandLandmarks[8];
      if (handCount >= 2) {
        volHandLandmarks = list[order[1]];
        volLm8 = volHandLandmarks[8];
      }
    }

    if (handCount === 0) {
      handLine.textContent = 'Hands: none (muted)';
    } else if (handCount === 1) {
      handLine.textContent = 'Hands: 1 — pitch only, volume fixed at 0.5';
    } else {
      handLine.textContent = 'Hands: 2 — green pitch · blue volume';
    }

    applyAudioFromHands(pitchLm8, volLm8, handCount, pitchHandLandmarks, volHandLandmarks);

    if (DEBUG_PIPELINE) {
      debugFrameCounter++;
      if (debugFrameCounter % 45 === 0) {
        console.log('HAND:', { handCount, hasPitch: !!pitchHandLandmarks, hasVol: !!volHandLandmarks });
        console.log('FEATURES:', {
          pitchNormX: Number(smoothPitchNormX).toFixed(4),
          smoothVol: Number(smoothVol).toFixed(4),
          mode: displayMode,
          intent: displayIntent
        });
        console.log(
          'AUDIO',
          typeof Tone !== 'undefined' && Tone.context ? Tone.context.state : 'no-tone',
          'audioRunning:',
          audioRunning
        );
      }
    }

    lastPitchLandmarks = pitchHandLandmarks;

    if (learnModeActive && currentSong) {
      updateLearnPlayback();
    }
    const learnAligned =
      !!(learnModeActive &&
        currentSong &&
        pitchHandLandmarks &&
        Math.abs(smoothPitchNormX - learnTargetX) < LEARN_ALIGN_THRESH);
    drawFingerDots(pitchLm8, volLm8, handCount, list, order, learnAligned);
  }

  let calStep = 0;

  function setCalInstruction() {
    const texts = [
      'Step 1/3: Open your pitch hand wide (spread index and pinky), then tap Capture.',
      'Step 2/3: Pinch thumb and index together, then Capture.',
      'Step 3/3: Relax your hand to a neutral curve, then Capture.'
    ];
    calInstruction.textContent = texts[calStep] || '';
  }

  function finishCalibration() {
    try {
      localStorage.setItem('thereminCalDone', '1');
      saveCalToStorage();
    } catch (_) {}
    calOverlay.classList.add('hidden');
    btnStart.disabled = false;
  }

  function openCalibration() {
    calStep = 0;
    setCalInstruction();
    calOverlay.classList.remove('hidden');
    btnStart.disabled = true;
  }

  loadCalFromStorage();

  function maybeShowCalibrationOnLoad() {
    try {
      if (localStorage.getItem('thereminCalDone') === '1') {
        calOverlay.classList.add('hidden');
        btnStart.disabled = false;
        return;
      }
    } catch (_) {}
    openCalibration();
  }

  calCapture.addEventListener('click', function () {
    const lm = lastPitchLandmarks;
    if (!lm || !lm[8]) {
      calInstruction.textContent = 'Show your pitch hand in view, then Capture again.';
      return;
    }
    if (calStep === 0) {
      cal.spreadMax = Math.max(cal.spreadMin + 0.04, spreadIndexPinkyRaw(lm));
      cal.openMax = Math.max(cal.openMin + 0.02, pinchOpennessRaw(lm));
      calStep = 1;
      setCalInstruction();
    } else if (calStep === 1) {
      cal.openMin = Math.max(0.01, Math.min(pinchOpennessRaw(lm), cal.openMax - 0.02));
      cal.spreadMin = Math.max(0.01, Math.min(spreadIndexPinkyRaw(lm), cal.spreadMax - 0.03));
      calStep = 2;
      setCalInstruction();
    } else {
      cal.curvatureBaseline = fingerCurvatureAvg(lm);
      finishCalibration();
    }
  });

  calSkip.addEventListener('click', function () {
    finishCalibration();
  });

  btnRecalibrate.addEventListener('click', function () {
    openCalibration();
  });

  maybeShowCalibrationOnLoad();

  const hands = new Hands({
    locateFile: function (file) {
      return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + file;
    }
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });
  hands.onResults(onResults);

  const camera = new Camera(video, {
    onFrame: async function () {
      try {
        await hands.send({ image: video });
      } catch (e) {
        handLine.textContent = 'Hands error: ' + (e && e.message ? e.message : String(e));
      }
    },
    width: 1280,
    height: 720
  });

  video.addEventListener('loadeddata', function () {
    resizeCanvas();
  });

  camera.start().catch(function (err) {
    handLine.textContent = 'Camera error: ' + (err && err.message ? err.message : String(err));
  });
})();
  </script>
</body>
</html>
